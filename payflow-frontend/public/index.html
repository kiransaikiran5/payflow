<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#1976d2" />
    <meta name="color-scheme" content="light" />
    
    <!-- SEO & Description -->
    <meta name="description" content="PayFlow – Modern Payroll Management System. Streamline employee payroll, generate payslips, and manage HR tasks efficiently." />
    <meta name="keywords" content="payroll, HR, payslips, employee management, salary, React, FastAPI" />
    <meta name="author" content="PayFlow Team" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="PayFlow - Payroll Management System" />
    <meta property="og:description" content="Secure, modern payroll solution for businesses of all sizes." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="PayFlow" />

    <!-- Favicon & Icons -->
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Google Fonts - Modern, clean typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />

    <!-- Optional: Preload critical assets -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <title>PayFlow | Payroll Management System</title>

    <!-- Small inline style to prevent FOUC and provide a nice loading experience -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
        min-height: 100vh;
      }
      #root {
        min-height: 100vh;
      }
      /* Simple loading indicator while React loads */
      .loading-spinner {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%);
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(25, 118, 210, 0.1);
        border-radius: 50%;
        border-top-color: #1976d2;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="text-align: center; padding: 2rem; font-family: system-ui;">
        <strong>JavaScript is required to run this application.</strong><br />
        Please enable JavaScript in your browser settings.
      </div>
    </noscript>
    <div id="root">
      <!-- Fallback loading indicator – will be replaced by React -->
      <div class="loading-spinner">
        <div class="spinner"></div>
      </div>
    </div>
  </body>
</html>
